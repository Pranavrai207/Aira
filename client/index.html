<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aira — Minimal AI Agent</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/chat.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
    <!-- Intro Overlay -->
    <div id="intro-overlay">
        <video id="intro-video" playsinline>
            <source src="assets/intro.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Main App UI -->
    <div id="app-container" class="hidden">
        <aside id="history-panel">
            <header style="border:none; padding: 0; margin-bottom: 20px; height: auto;">
                <div class="logo">Aira</div>
            </header>
            
            <nav id="sidebar-nav">
                <button id="new-chat-btn" class="glass-btn">New Chat +</button>
                
                <div id="search-container">
                    <input type="text" id="search-chats" placeholder="Search chats..." autocomplete="off">
                </div>

                <div class="sidebar-section">
                    <h3>Recent History</h3>
                    <div id="session-list">
                        <!-- History items -->
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>Tools & Settings</h3>
                    <button class="sidebar-tool-btn" id="settings-btn">⚙️ Settings</button>
                    <button class="sidebar-tool-btn" id="recall-btn">🧠 Memory Recap</button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="user-badge">Pranav</div>
            </div>
        </aside>

        <main>
            <header id="main-header">
                <div class="agent-model-status">
                    <span id="current-tool">Aira Agent — v1.0</span>
                </div>
            </header>

            <section id="chat-panel">
                <div id="chat-messages">
                    <!-- Messages appear here -->
                </div>
                
                <div id="input-container">
                    <button id="attach-btn" class="action-btn">📎</button>
                    <input type="file" id="file-input" style="display:none;" multiple>
                    <input type="text" id="user-input" placeholder="Message Aira..." autocomplete="off">
                    <div class="prompt-actions">
                        <button id="mic-btn" class="action-btn">🎤</button>
                        <button id="send-btn">Send</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Settings</h2>
                <button id="close-settings" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="settings-group">
                    <label>Theme</label>
                    <select id="theme-select">
                        <option value="light">Light</option>
                        <option value="dark">Dark</option>
                        <option value="cyberpunk">Cyberpunk</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label>Preferred Model</label>
                    <select id="model-select">
                        <option value="auto">Auto-Select (Recommended)</option>
                        <option value="llama3.2:1b">Llama 3.2 (Fast)</option>
                        <option value="gemma2:2b">Gemma 2 (Conversational)</option>
                        <option value="moondream:latest">Moondream (Vision)</option>
                    </select>
                </div>
                <div class="settings-group">
                    <label>Auto-Recall Memory</label>
                    <input type="checkbox" id="auto-recall" checked>
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-settings" class="glass-btn primary">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Memory Recap Modal -->
    <div id="recap-modal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <div class="modal-header">
                <h2>Memory Recap</h2>
                <button id="close-recap" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="recap-stats">
                    <div class="stat-card">
                        <span class="stat-label">Indexed Documents</span>
                        <span id="recap-doc-count" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-label">Total Sessions</span>
                        <span id="recap-session-count" class="stat-value">0</span>
                    </div>
                </div>
                <div class="recap-section">
                    <h3>Core Instincts</h3>
                    <ul id="recap-instincts-list">
                        <!-- Instincts loaded here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="chat/socketClient.js"></script>
    <script src="chat/chatUI.js"></script>
    <script src="intro/introSequence.js"></script>
</body>
</html>
